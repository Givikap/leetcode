repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: debug-statements
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-use-type-annotations

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args:
          - --line-length=79

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args:
          - --extend-ignore=E203

  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.5
    hooks:
      - id: clang-format
        types_or: [c, c++, header]
        files: \.(c|cpp|h|hpp)$

  - repo: local
    hooks:
      - id: clang-tidy
        name: clang-tidy
        entry: clang-tidy
        language: system
        types_or: [c, c++, header]
        files: \.(c|cpp|h|hpp)$

  - repo: local
    hooks:
      - id: google-java-format
        name: google-java-format
        entry: google-java-format -i
        language: system
        types: [java]

  - repo: https://codeberg.org/gherynos/pre-commit-java
    rev: v0.6.39
    hooks:
      - id: pmd
        args: ["-R=configs/pmd.xml"]
      - id: cpd
      - id: checkstyle
        args: ["-c", "configs/checkstyle.xml"]
